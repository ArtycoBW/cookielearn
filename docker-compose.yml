services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - cookielearn

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_STUDENT_EMAIL_DOMAIN: ${NEXT_PUBLIC_STUDENT_EMAIL_DOMAIN:-student.cookielearn.local}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cookielearn

networks:
  cookielearn:
    driver: bridge
